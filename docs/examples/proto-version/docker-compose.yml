# Reproducible Postgres for the proto_version / pgoutput write-up.
#
#   docker compose up --wait        # gated on the healthcheck
#
# Postgres 16 is chosen deliberately: it supports proto_version 1, 2, 3 AND 4, so every
# version in the matrix can be exercised from one server. logical_decoding_work_mem is set
# absurdly low (64kB) so a few-thousand-row transaction is enough to trip streaming — the
# real default is 64MB, which would need millions of rows to observe.
services:
  pg:
    image: postgres:16
    container_name: walrus-proto-pg
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: walrus
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=logical          # required for any logical replication / decoding
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - logical_decoding_work_mem=64kB   # tiny, so streaming triggers on small txns
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d walrus"]
      interval: 2s
      timeout: 3s
      retries: 15
