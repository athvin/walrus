# EXAMPLE ONLY — do NOT apply as-is and do NOT commit real credentials.
#
# Copy to secrets.yaml, fill in real connection strings, and create it out-of-band (or via a sealed-
# secret / external-secrets operator). It is intentionally excluded from kustomization.yaml so a
# placeholder never lands in the cluster. Only the two Postgres URLs live here (they embed passwords);
# S3 credentials are NOT here — they come from IRSA / Workload Identity via the `walrus` ServiceAccount.
#
#   kubectl create secret generic walrus-secrets \
#     --from-literal=WALRUS_CONTROL_DB_URL='postgres://walrus:...@control-pg:5432/walrus_control' \
#     --from-literal=WALRUS_SOURCE_DB_URL='postgres://walrus:...@source-pg:5432/walrus'
apiVersion: v1
kind: Secret
metadata:
  name: walrus-secrets
  labels:
    app.kubernetes.io/name: walrus
type: Opaque
stringData:
  # Control plane: manifest / checkpoint / registry writes (sink + loader).
  WALRUS_CONTROL_DB_URL: "postgres://REPLACE_ME:REPLACE_ME@control-pg:5432/walrus_control"
  # Source database: the replication + backfill connection (sink only). The role needs REPLICATION.
  WALRUS_SOURCE_DB_URL: "postgres://REPLACE_ME:REPLACE_ME@source-pg:5432/walrus"
