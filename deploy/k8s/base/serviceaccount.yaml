# One ServiceAccount for both workloads. In production this SA is bound to a cloud identity so the S3
# client (sink writer, loader httpfs) gets credentials from the environment — NO static access keys in
# any manifest. Uncomment the annotation for your platform:
#   * AWS EKS (IRSA):        eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/walrus
#   * GKE Workload Identity: iam.gke.io/gcp-service-account: walrus@<project>.iam.gserviceaccount.com
# The Dockerfiles build the S3 client with AmazonS3Builder::from_env(), which honours the projected
# web-identity token these mechanisms mount — so `AWS_*` env keys are never needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: walrus
  labels:
    app.kubernetes.io/name: walrus
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/walrus
