name: walrus

# Dev harness for walrus: the three backing services every later "compose" Definition of Done
# runs against (the sink writing to MinIO, the loader reading a manifest). Boot it with:
#
#   docker compose -f deploy/docker/docker-compose.yml up --wait     # (or `just up`)
#
# `up --wait` blocks until all three long-running services report healthy and the one-shot
# `createbucket` has created the `walrus` bucket. Every service defines a healthcheck so `--wait`
# is a real gate (no `sleep`s).
services:
  source-pg: # the replicated-from database
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: walrus
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=logical # required for logical replication / decoding
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - logical_decoding_work_mem=64kB # tiny → streaming trips on small txns (Phase 2 tests)
    volumes:
      - ./initdb/source:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d walrus"]
      interval: 2s
      timeout: 3s
      retries: 15

  control-pg: # walrus control plane (manifest/checkpoint/registry)
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: walrus_control
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d walrus_control"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio: # S3-compatible staging bucket
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15

  createbucket: # creates the `walrus` bucket, then idles so `up --wait` can gate on its health
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    # `up --wait` treats a container that *exits* as a failure (even exit 0), so instead of a
    # one-shot we create the bucket then idle, exposing a healthcheck that passes once the bucket
    # exists. `--wait` then blocks until the bucket is genuinely there.
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
                  mc mb --ignore-existing local/walrus &&
                  exec tail -f /dev/null"
    healthcheck:
      test: ["CMD-SHELL", "mc ls local/walrus >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15
