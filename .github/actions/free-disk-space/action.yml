name: Free disk space
description: Reclaim runner disk headroom for the bundled-DuckDB build

# The bundled DuckDB compiles from source into large artifacts; the cold-build path can exhaust the
# runner's ~14 GB and fail with "No space left on device". Reclaim the preinstalled toolchains we
# don't use for headroom. Hoisted out of the gates / integration / images jobs (PR 5.1) so the
# reclaim lives in exactly one place. Composite actions run from the checked-out tree, so any job
# using this must `actions/checkout` first.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift || true
        df -h /
