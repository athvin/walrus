name: CI

# Every code push and PR runs the baseline gates plus the phase-specific jobs. This is the
# machine-checked definition of "green" that every later PR in the roadmap inherits
# (docs/implementation/README.md → "CI grows with the phases"). New gates (compose, sqlx offline,
# conformance, cargo-deny, kubeconform) switch on in later phases as the code that needs them lands.
# A cheap `changes` job classifies the diff so a docs-only commit skips the compile-heavy jobs
# (gates / integration / conformance / images / compose); the ungated jobs (supply-chain, msrv,
# manifests) are seconds each and always run (PR 5.1).
on:
  push:
  pull_request:

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # A cheap classifier (runs in seconds) so a docs-only change can skip the compile-heavy jobs. It
  # emits `code: true` when the diff touches anything that can affect a build/test/image, and
  # `code: false` for pure docs (docs/**, *.md, LICENSE). The heavy jobs gate on this output; an
  # `if:`-skipped job reports success, so required checks stay satisfied — unlike a workflow-level
  # `paths:` filter, which reports *nothing* on a filtered run and would wedge branch protection.
  changes:
    name: changes (classify diff)
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      # paths-filter needs the tree on a bare `push` (it diffs against the push's before-SHA); on
      # `pull_request` it diffs against the base branch automatically. Checkout must come first.
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'tests/**'
              - 'migrations/**'
              - 'deploy/**'
              - 'scripts/**'
              - 'Cargo.*'
              - 'rust-toolchain.toml'
              - 'justfile'
              - 'deny.toml'
              - '.github/**'

  gates:
    name: fmt · clippy · test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # sccache caches at compiler-invocation granularity (rustc crate outputs + the DuckDB C++ .o
    # files) in the GHA backend, so identical compilations hit across jobs, profiles, and Cargo.lock
    # changes — unlike Swatinem's target-dir cache, which any dep bump invalidates. CC/CXX route the
    # cc-crate's DuckDB C++ build through sccache (the expensive payload); CARGO_INCREMENTAL=0
    # because sccache refuses to cache incremental rustc. (PR 5.2)
    env:
      RUSTC_WRAPPER: sccache
      CC: sccache cc
      CXX: sccache c++
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4

      # Reclaim disk for the bundled-DuckDB test build (composite action; must follow checkout).
      - uses: ./.github/actions/free-disk-space

      # rust-toolchain.toml pins the channel + rustfmt/clippy components; install it explicitly so
      # the version is logged and the cache key below is computed against the pinned rustc. (rustup
      # 1.28+ no longer auto-installs the toolchain-file toolchain on first proxy use.)
      - name: Install pinned Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup toolchain install
          rustc --version
          cargo --version

      # Starts the sccache server and points it at the GHA cache backend (SCCACHE_GHA_ENABLED). Pinned.
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # Cheapest gate first: fail fast on formatting before spending time on clippy/test. There is no
      # standalone `cargo build` step — `clippy --all-targets` type-checks every target and `test`
      # builds + runs them, so a third dev-profile compile adds cost without new signal (PR 5.1).
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  compose:
    name: compose (source-pg · control-pg · minio)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `up --wait` is the deterministic gate: it blocks until all three services are healthy and
      # the createbucket one-shot has completed. GitHub's ubuntu runners ship Docker + Compose v2.
      - name: Boot the dev stack (up --wait)
        run: docker compose -f deploy/docker/docker-compose.yml up --wait

      - name: Show service state
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml ps -a

      - name: Smoke — services reachable, seeded, and bucket present
        run: |
          set -euo pipefail
          C="docker compose -f deploy/docker/docker-compose.yml"
          # Both Postgres instances accept connections (checked inside the containers).
          $C exec -T source-pg pg_isready -U postgres -d walrus
          $C exec -T control-pg pg_isready -U postgres -d walrus_control
          # MinIO health on the published port.
          curl -sf http://localhost:9000/minio/health/live
          # Source PG came up with wal_level=logical.
          wal_level=$($C exec -T source-pg psql -U postgres -d walrus -tAc "SHOW wal_level")
          echo "wal_level=$wal_level"; test "$wal_level" = "logical"
          # Publication covers >= 3 tables (orders / customers / items).
          count=$($C exec -T source-pg psql -U postgres -d walrus -tAc "SELECT count(*) FROM pg_publication_tables")
          echo "pg_publication_tables=$count"; test "$count" -ge 3
          # The walrus bucket exists (createbucket sidecar created it and is healthy).
          $C exec -T createbucket mc ls local/walrus

      - name: Tear down (remove volumes)
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml down -v

  integration:
    name: integration (control migrations + sqlx offline)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      # Both point at the compose control-pg (host port 5433). WALRUS_CONTROL_DB_URL drives the
      # integration test; DATABASE_URL is what `sqlx prepare` connects to.
      WALRUS_CONTROL_DB_URL: postgres://postgres:postgres@localhost:5433/walrus_control
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/walrus_control
      # sccache: cache rustc + the DuckDB C++ objects across jobs/profiles/Cargo.lock (PR 5.2).
      RUSTC_WRAPPER: sccache
      CC: sccache cc
      CXX: sccache c++
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4

      # Same disk-headroom reclaim as the gates job — this job also cold-builds the bundled DuckDB.
      - uses: ./.github/actions/free-disk-space

      - name: Install pinned Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup toolchain install
          rustc --version

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Boot the dev stack (up --wait)
        run: docker compose -f deploy/docker/docker-compose.yml up --wait

      # Apply the control schema before compiling: with DATABASE_URL set, sqlx's query! macros
      # introspect the live DB at *compile* time, so the tables must exist first (the tests also
      # re-run migrations idempotently at runtime). This also gives `sqlx prepare --check` a schema.
      - name: Apply control migrations
        run: sqlx migrate run --source migrations/control

      - name: Control integration tests (migrations schema/CHECK + file_manifest claim order)
        run: cargo test -p control --features integration

      # The type-descriptor round-trip is #[ignore]-gated (it dev-deps pg-to-arrow); run it explicitly
      # against the live control PG. Reuses the --features integration build from the step above.
      - name: schema_registry TypeDescriptor round-trip (PR 2.17)
        run: cargo test -p control --features integration -- --ignored schema_registry_roundtrips_a_type_descriptor

      - name: sqlx offline cache is up to date (cargo sqlx prepare --check)
        run: cargo sqlx prepare --check --workspace

      # PR 2.19: source-side preflight over the live source PG (good source passes; control-pg's
      # wal_level=replica is terminal; keyless table; publication gap).
      - name: Source preflight (compose)
        run: cargo test -p pg-sink --test preflight -- --ignored

      # PR 2.20: the START_REPLICATION transport spike — a source write yields an XLogData frame, and
      # standby-status keepalive feedback keeps the connection alive past wal_sender_timeout (5s).
      - name: Replication spike (compose)
        run: cargo test -p pg-sink --test replication_spike -- --ignored

      # PR 2.21: live pgoutput decode — an INSERT decodes to Begin/Relation/Insert/Commit.
      - name: Live decode (compose)
        run: cargo test -p pg-sink --test live_decode -- --ignored

      # PR 2.22: relation cache → schema_registry round-trip (first Relation writes a row; hydrate).
      - name: Relation cache (compose)
        run: cargo test -p pg-sink --test relation_cache -- --ignored

      # PR 2.23: micro-batching — a stream of inserts forms and seals a batch.
      - name: Batching (compose)
        run: cargo test -p pg-sink --test batching -- --ignored

      # PR 2.24: Arrow → Parquet → S3 PUT — object lands at the epoch key and reads back (MinIO).
      - name: Parquet S3 PUT (compose)
        run: cargo test -p pg-sink --test parquet_put -- --ignored

      # PR 2.25: manifest INSERT — object + ready row both exist; lsn_end == commit LSN.
      - name: Manifest insert (compose)
        run: cargo test -p pg-sink --test manifest_insert -- --ignored

      # PR 2.26: durability checkpoint — confirmed_flush_lsn advances to a batch's lsn_end only after
      # the S3 PUT + manifest commit; a crash before the standby update re-streams (at-least-once).
      - name: Durability checkpoint (compose)
        run: cargo test -p pg-sink --test durability -- --ignored --test-threads=1

      # PR 2.27: idle heartbeat — an idle publication beats after idle_after, the beat_seq returns
      # through the stream, confirmed_flush_lsn advances, and the beat is never staged to a manifest.
      - name: Heartbeat liveness (compose)
        run: cargo test -p pg-sink --test heartbeat_liveness -- --ignored --test-threads=1

      # PR 2.28: graceful drain — SIGTERM flushes the in-flight committed batch + manifest, advances
      # confirmed_flush via a final standby update, sends CopyDone, never drops the slot, and resumes.
      - name: Graceful shutdown drain (compose)
        run: cargo test -p pg-sink --test graceful_shutdown -- --ignored --test-threads=1

      # PR 2.29: snapshot backfill — preloaded rows produce kind='snapshot' files sharing one
      # lsn_end=consistent_point; a row written after the export streams once (no double count).
      - name: Snapshot backfill (compose)
        run: cargo test -p pg-sink --test snapshot_backfill -- --ignored --test-threads=1

      # PR 2.30: large-txn streaming — an 8000-row txn (logical_decoding_work_mem=64kB) writes ready
      # rows only after Stream Commit; a whole-txn abort writes none.
      - name: Streaming large txn (compose)
        run: cargo test -p pg-sink --test streaming_large_txn -- --ignored --test-threads=1

      # PR 2.31: the flagship — a rolled-back savepoint inside a committing streamed txn (proto §9b)
      # yields a ready file with EXACTLY 6000 rows; the rolled-back sub-xid's rows are never present.
      - name: Sub-transaction exclusion (compose)
        run: cargo test -p pg-sink --test subtransaction_exclusion -- --ignored --test-threads=1

      # PR 2.32: aggregate max_inflight_bytes — a large open txn under a low ceiling spills
      # speculatively (spill_count increments), memory stays bounded, and the slot is never advanced.
      - name: Max inflight bytes (compose)
        run: cargo test -p pg-sink --test max_inflight_bytes -- --ignored --test-threads=1

      # PR 2.33: DDL capture — an ALTER ADD COLUMN writes a ddl_manifest row (c_lsn), bumps the
      # structural schema_version + cuts a fresh file; a COMMENT is metadata-only; internal never staged.
      - name: DDL capture (compose)
        run: cargo test -p pg-sink --test ddl_capture -- --ignored --test-threads=1

      # PR 6.2: the reload signal table — a signal INSERT is decode-visible through the slot
      # (wal_insert_lsn stamped by the DEFAULT), backfill never copies it, and preflight is terminal
      # on a missing/unpublished table (or heals the gap under manage_publication).
      - name: Reload signal (compose)
        run: cargo test -p pg-sink --test reload_signal -- --ignored --test-threads=1

      # PR 6.3: echo routing — a manual reload_signal INSERT resolves a subscribed watermark waiter
      # with the txn's COMMIT LSN (embedded < commit cross-check holds) and never reaches a
      # batcher / Parquet file / manifest row.
      - name: Reload echo (compose)
        run: cargo test -p pg-sink --test reload_echo -- --ignored --test-threads=1

      # PR 6.4: the reload controller — pickup flips requested → exporting with a live, advancing
      # lease; unpublished/keyless/resync requests fail fast with reasons; cap=2 holds under three
      # requests while the stream keeps flowing.
      - name: Reload pickup (compose)
        run: cargo test -p pg-sink --test reload_pickup -- --ignored --test-threads=1

      # PR 6.5: the chunk export engine — 2,500 rows at chunk_rows=1000 ⇒ exactly 3 kind='reload'
      # files whose union is the table, every row stamped commit_lsn = lsn = L_i; cursor resume
      # never re-exports; a never-arriving echo fails loudly with the publication hint.
      - name: Reload export (compose)
        run: cargo test -p pg-sink --test reload_export -- --ignored --test-threads=1

      # PR 6.7: the rebuild trigger — first kind='reload' file with a newer reload_id replaces both
      # tables at the file's version (phantoms die, mid-export updates win, deletes hold), purges
      # superseded pending rows, clears the quarantine; stale-id files retire unapplied.
      - name: Reload rebuild (compose)
        run: cargo test -p loader --test reload_rebuild -- --ignored --test-threads=1

      # PR 6.8: restart-on-DDL — an ALTER between chunks trips the staleness check ⇒ old attempt
      # failed + chunk files purged + a successor exporting at restart_count=1 re-exporting at the
      # new schema; a cap of 0 fails the reload outright, no successor, both metrics move.
      - name: Reload DDL restart (compose)
        run: cargo test -p pg-sink --test reload_ddl -- --ignored --test-threads=1

      # PR 6.9: completion & crash recovery — a dropped export is adopted from control-pg and
      # resumes from the cursor (no re-export), flips export_complete(H); the loader flips complete
      # only once transformed_lsn ≥ H; a live foreign lease is never stolen, an expired one is.
      - name: Reload recovery (compose)
        run: cargo test -p pg-sink --test reload_recovery -- --ignored --test-threads=1

      # PR 2.18/2.19: the sink pod-lifecycle shell against the live stack — full bootstrap (control +
      # S3 + source preflight) → /startup→/ready flip, SIGTERM exit 0, missing control DB → exit 11.
      - name: Sink pod-lifecycle smoke (health · SIGTERM · fail-fast exit code)
        run: bash scripts/sink-smoke.sh

      # PR 3.1: loader bootstrap — acquires the ownership lease, opens <table>.duckdb with both
      # <table> and <table>_raw, loads watermarks; a live-lease 2nd instance exits terminal; a stale
      # lock behind an expired lease is reclaimed.
      - name: Loader bootstrap (compose)
        run: cargo test -p loader --test bootstrap -- --ignored --test-threads=1

      # PR 3.2: Phase A — claim ready files → append verbatim to <table>_raw (meta intact + promoted
      # columns) → one control txn advances raw_appended_lsn + deletes the queue; replay appends zero.
      - name: Loader Phase A (compose)
        run: cargo test -p loader --test phase_a -- --ignored --test-threads=1

      # PR 3.4: Phase B — transform the un-transformed tail (commit_lsn > transformed_lsn) into the
      # mirror; mirror == current source, transformed_lsn advances, re-run byte-identical.
      - name: Loader Phase B (compose)
        run: cargo test -p loader --test phase_b -- --ignored --test-threads=1

      # PR 3.8: additive/lossless DDL apply — both DuckDB tables evolve at the correct LSN relative to
      # data (ADD COLUMN across a schema_version boundary). Runs after the epoch-sensitive bootstrap
      # (read_current_epoch is MAX and this seeds a higher epoch).
      - name: Loader DDL additive (compose)
        run: cargo test -p loader --test ddl_additive -- --ignored --test-threads=1

      # PR 3.9: destructive DDL apply — a lossy int4→int2 cast on a populated mirror overflows and
      # quarantines the table (/ready degrades).
      - name: Loader DDL destructive (compose)
        run: cargo test -p loader --test ddl_destructive -- --ignored --test-threads=1

      # PR 3.10: snapshot/stream boundary — an overlapping stream change out-ranks the snapshot row, and
      # equal-lsn_end snapshot files split across batches all land (the `>=` bound + PR 3.7 guard). Uses
      # its own explicit epochs (constructs TableCtx directly), so it is order-independent vs bootstrap.
      - name: Loader snapshot boundary (compose)
        run: cargo test -p loader --test snapshot_boundary -- --ignored --test-threads=1

      # PR 3.11: full-rebuild reclaims blocks a DELETE only tombstones (needs a real .duckdb file, not the
      # compose services); the hermetic rebuild==incremental / pruned-value-survives cases run in gates.
      - name: Loader compaction reclaim (real file)
        run: cargo test -p loader --test compaction -- --ignored --test-threads=1

      # PR 3.12: graceful SIGTERM drain — both watermarks commit + lease released + no stale lock; an
      # in-flight full-rebuild is aborted (rolled back); a replacement resumes from the two watermarks.
      - name: Loader graceful shutdown (compose)
        run: cargo test -p loader --test shutdown -- --ignored --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Tear down (remove volumes)
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml down -v

  conformance:
    name: conformance (DuckDB read-back)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      # sccache: cache rustc + the DuckDB C++ objects across jobs/profiles/Cargo.lock (PR 5.2).
      RUSTC_WRAPPER: sccache
      CC: sccache cc
      CXX: sccache c++
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup toolchain install
          rustc --version

      - uses: mozilla-actions/sccache-action@v0.0.10

      # sccache caches the individual DuckDB C++ objects; Swatinem still caches the registry + the
      # finished target dir so a fully-warm run rebuilds nothing (the two layers are complements).
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Conformance tests (write Parquet -> DuckDB read_parquet -> assert typeof + value)
        run: cargo test -p pg-to-arrow --features conformance

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # PR 4.7: supply-chain gate. `cargo deny check` runs all four families (advisories / licenses /
  # bans / sources) against Cargo.lock — no crate compilation, so this job is fast and needs no
  # DuckDB build. cargo-deny is pinned to an exact version (matching the one deny.toml was authored
  # against) so a new release can't silently change the gate; new RUSTSEC advisories still surface,
  # which is the point of the advisories check.
  supply-chain:
    name: supply-chain (cargo-deny · advisories · licenses · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny (pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.9

      - name: cargo deny check
        run: cargo deny check

  # PR 4.7: MSRV drift guard. walrus pins one exact stable in rust-toolchain.toml and every job above
  # builds + tests on it, so CI already builds on the MSRV — this job's role is to fail fast if the
  # declared MSRV (Cargo.toml [workspace.package].rust-version) and the pinned toolchain channel ever
  # diverge, turning a toolchain drift into an explicit CI failure instead of a mystery build break.
  # Cheap: string comparison only, no toolchain install or compile.
  msrv:
    name: MSRV (declared rust-version == pinned toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Declared MSRV matches the pinned toolchain
        run: |
          set -euo pipefail
          declared=$(sed -nE 's/^[[:space:]]*rust-version[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+)".*/\1/p' Cargo.toml | head -1)
          pinned=$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([0-9]+\.[0-9]+).*/\1/p' rust-toolchain.toml | head -1)
          echo "declared MSRV  (Cargo.toml)          = ${declared:-<none>}"
          echo "pinned channel (rust-toolchain.toml) = ${pinned:-<none>}"
          if [ -z "$declared" ] || [ -z "$pinned" ]; then
            echo "::error::could not parse the MSRV / toolchain version"; exit 1
          fi
          if [ "$declared" != "$pinned" ]; then
            echo "::error::MSRV drift — Cargo.toml rust-version ($declared) != rust-toolchain.toml channel ($pinned); keep them in sync."
            exit 1
          fi
          echo "ok: the gates/integration/conformance jobs build on this exact toolchain, i.e. on the MSRV ($declared)."

  # PR 4.8: container images. Build both multi-stage Dockerfiles, then run the PID-1 SIGTERM smoke
  # (scripts/image-smoke.sh): boot compose, drive the sink to `streaming` and the loader to its apply
  # loops, SIGTERM each, and assert a graceful exit 0 (not 137/SIGKILL). The loader image cold-builds
  # the bundled DuckDB C++, so this job is slow like the other DuckDB jobs.
  images:
    name: images (build + PID-1 SIGTERM smoke)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Both images (esp. the loader's bundled-DuckDB build) are large; reclaim runner disk headroom.
      - uses: ./.github/actions/free-disk-space

      # PR 5.3: build via buildx with the GHA layer cache. The Dockerfiles use cargo-chef, whose `cook`
      # layer (all deps incl. the bundled-DuckDB C++ build) is keyed on the workspace Cargo manifests,
      # so a source-only change is a layer-cache hit and DuckDB is not recompiled. `mode=max` is
      # essential — it caches the intermediate builder/cook layers, not just the final runtime stage.
      # (Cache MOUNTS were tried first and dropped: cargo's mtime fingerprinting re-runs the DuckDB
      # build script after a cache tar-restore, so the C++ build repeated regardless — chef sidesteps
      # that by using the content-hashed Docker layer cache.)
      - uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Build walrus-pg-sink image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.pg-sink
          tags: walrus-pg-sink:ci
          load: true
          cache-from: type=gha,scope=pg-sink
          cache-to: type=gha,scope=pg-sink,mode=max

      - name: Build walrus-loader image (bundled DuckDB — chef-cooked deps cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.loader
          tags: walrus-loader:ci
          load: true
          cache-from: type=gha,scope=loader
          cache-to: type=gha,scope=loader,mode=max

      - name: PID-1 SIGTERM smoke (both images handle SIGTERM → exit 0, not SIGKILL)
        run: bash scripts/image-smoke.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker ps -a
          docker logs walrus-sink-smoke 2>&1 | tail -60 || true
          docker logs walrus-loader-smoke 2>&1 | tail -60 || true

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml down -v || true

  # PR 4.9: Kubernetes manifests. Render the kustomize base (LoadRestrictionsNone — the slot-init
  # ConfigMap is generated from the real migrations/source/*.sql outside base/) and schema-validate every
  # resource with kubeconform in strict mode against a pinned API version. Fast, no cluster required.
  manifests:
    name: manifests (kustomize + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize + kubeconform (pinned)
        run: |
          KUSTOMIZE_VERSION=v5.4.3
          KUBECONFORM_VERSION=v0.6.7
          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kustomize
          curl -sSfL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
          kustomize version
          kubeconform -v

      - name: Validate manifests (kustomize render → kubeconform strict)
        run: bash scripts/k8s-validate.sh
